state_file = ".codex-channel/sessions.json"

[adapter]
type = "console"
default_conversation_id = "openclaw"
banner = """
codex-channel console adapter is running.
Type a message and press Enter.
Use `thread-id > your message` to simulate multiple IM conversations.
Use `/quit` to stop.
"""

[codex]
launcher = ["codex"]
working_directory = ".."
use_app_server = true
app_server_url = "ws://127.0.0.1:8765"
sandbox = "workspace-write"
ask_for_approval = "on-request"
search = false
http_proxy = ""
https_proxy = ""
all_proxy = ""
no_proxy = ""
model = "gpt-5.4"
profile = ""
skip_git_repo_check = true
full_auto = false
turn_timeout_secs = 90
additional_writable_dirs = []
extra_args = []
